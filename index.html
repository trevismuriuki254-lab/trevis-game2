<!DOCTYPE html>
<html>
<head>
  <title>Trevis Platform Game</title>

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:skyblue;
    }

    #game{
      position:relative;
      width:100vw;
      height:100vh;
    }

    #player{
      width:50px;
      height:50px;
      background:red;
      position:absolute;
      bottom:100px;
      left:100px;
    }

    .ground{
      width:100%;
      height:100px;
      background:green;
      position:absolute;
      bottom:0;
    }
  </style>
</head>

<body>

<div id="game">
  <div id="player"></div>
  <div class="ground"></div>
</div>

<script>
  const player = document.getElementById("player");

  let x = 100;
  let y = 100;
  let velocityY = 0;
  let jumping = false;

  document.addEventListener("keydown", (e) => {

    if(e.key === "ArrowRight"){
      x += 20;
    }

    if(e.key === "ArrowLeft"){
      x -= 20;
    }

    if(e.key === " " && !jumping){
      velocityY = 18;
      jumping = true;
    }
  });

  function gameLoop(){

    velocityY -= 1;
    y += velocityY;

    if(y <= 100){
      y = 100;
      jumping = false;
    }

    player.style.left = x + "px";
    player.style.bottom = y + "px";

    requestAnimationFrame(gameLoop);
  }

  gameLoop();
</script>

</body>
</html>
